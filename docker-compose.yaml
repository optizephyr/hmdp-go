services:
  mysql:
    image: mysql:8.0.36
    container_name: hmdp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hmdp
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./hmdp.sql:/docker-entrypoint-initdb.d/hmdp.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hmdp-net

  redis:
    image: redis:7.2-alpine
    container_name: hmdp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hmdp-net

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: hmdp-rocketmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -v grep | grep mqnamesrv"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hmdp-net

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: hmdp-rocketmq-broker
    user: root
    restart: unless-stopped
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: -Xms256m -Xmx256m -Xmn128m
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf:ro
      # 👇 新增的持久化数据卷挂载
      - rocketmq_broker_data:/home/rocketmq/store
      - rocketmq_broker_logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -v grep | grep mqbroker"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hmdp-net

  rocketmq-init:
    image: apache/rocketmq:5.3.2
    container_name: hmdp-rocketmq-init
    restart: "no"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    command: >
      sh -c "cd /home/rocketmq/rocketmq-5.3.2/bin &&
      until ./mqadmin updateTopic -n rocketmq-namesrv:9876 -b rocketmq-broker:10911 -t voucher-order-topic -r 4 -w 4; do
      sleep 5;
      done"
    networks:
      - hmdp-net

  nginx:
    image: nginx:alpine
    container_name: hmdp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "hmdp-api:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hmdp-net

# 👇 声明所有使用到的数据卷
volumes:
  mysql_data:
  redis_data:
  rocketmq_broker_data:
  rocketmq_broker_logs:

networks:
  hmdp-net:
    driver: bridge
